# Self-contained production stack for a single host (e.g. AWS EC2).
# db + app + Caddy (automatic HTTPS via Let's Encrypt). No external
# network required — unlike docker-compose.yml which attaches to an
# existing Nginx Proxy Manager.
#
#   first time:   ADMIN_PASSWORD='...' bash deploy/setup.sh
#   update:       bash deploy/update.sh

services:
  db:
    image: postgres:16-alpine
    container_name: xicoai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: xico
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: xico
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xico -d xico"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    image: xicoai-web
    container_name: xicoai-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://xico:${POSTGRES_PASSWORD}@db:5432/xico
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MAIL_DATA_DIR: /maildata
    volumes:
      - uploads:/app/uploads
      # Shared with the mailer so /admin/mail can serve inbound attachments.
      - maildata:/maildata
    expose:
      - "3000"
    networks:
      - internal
      - web

  # Site mail worker: outbound queue (transactional/marketing) + IMAP mirror
  # that copies new mail from the hi@ mailbox into the /admin/mail web inbox.
  # Protocol-level mail (MX :25, IMAP :993, submission :465/:587) is Stalwart's
  # job below — this worker no longer listens on any port.
  mail:
    build: ./mailer
    image: xicoai-mailer
    container_name: xicoai-mail
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://xico:${POSTGRES_PASSWORD}@db:5432/xico
    volumes:
      - maildata:/data
    networks:
      - internal
      - web

  # Enterprise mail backend (IMAP/SMTP/JMAP, one small Rust binary): real
  # mailboxes for xxx@xicoai.com usable from QQ Mail / Gmail / Apple Mail /
  # Outlook. Accounts are managed from /admin/mail/users via its REST API.
  # TLS certs come from Let's Encrypt over HTTP-01 (Caddy forwards
  # http://mail.xicoai.com/.well-known/acme-challenge here).
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: xicoai-stalwart
    restart: unless-stopped
    environment:
      # Pins the bootstrap/recovery admin so /admin/mail/users can always
      # reach the management API with STALWART_ADMIN_SECRET.
      STALWART_RECOVERY_ADMIN: admin:${STALWART_ADMIN_SECRET:-}
    ports:
      - "25:25"     # MX inbound
      - "465:465"   # SMTP submission (implicit TLS)
      - "587:587"   # SMTP submission (STARTTLS)
      - "993:993"   # IMAP (implicit TLS)
    volumes:
      - stalwart:/opt/stalwart
    networks:
      - internal
      - web

  caddy:
    image: caddy:2-alpine
    container_name: xicoai-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  pgdata:
  uploads:
  maildata:
  stalwart:
  caddy_data:
  caddy_config:

networks:
  internal:
  web:
